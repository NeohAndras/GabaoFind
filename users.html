<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>GabaoIndex — Utilisateurs</title>
  <meta name="description" content="Explorez les profils utilisateurs de GabaoIndex, leurs avis, notes et contributions." />
  <meta name="theme-color" content="#0f2d18" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; }
    .page-shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
    .topbar { position: sticky; top: 0; z-index: 20; backdrop-filter: blur(18px); background: rgba(10,26,15,.72); border-bottom: 1px solid var(--border); }
    .topbar-inner { max-width: 1200px; margin: 0 auto; padding: 16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { display:flex; align-items:center; gap:10px; color:var(--text-primary); text-decoration:none; font-weight:800; }
    .brand strong { color: var(--accent); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-link { display:inline-flex; align-items:center; justify-content:center; min-height:40px; padding:0 14px; border-radius:999px; text-decoration:none; font-weight:700; border:1px solid var(--border); color:var(--text-primary); background:rgba(255,255,255,.04); transition: transform var(--transition), border-color var(--transition), background var(--transition); }
    .btn-link:hover { transform: translateY(-1px); border-color: var(--brand); }
    .btn-primary { background: linear-gradient(135deg, var(--green-500), var(--green-400)); color:#fff; border-color: transparent; }
    .btn-primary:hover { color:#fff; }
    .hero { max-width: 1200px; margin: 0 auto; padding: 56px 24px 24px; text-align:center; }
    .hero h1 { font-family: var(--font-head); font-size: clamp(2.2rem, 6vw, 4rem); line-height: 1.05; margin-bottom: 14px; }
    .hero p { color: var(--text-secondary); max-width: 760px; margin: 0 auto 28px; }
    .panel { max-width: 1200px; margin: 0 auto; padding: 0 24px 56px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow-card); padding: 24px; backdrop-filter: blur(16px); }
    .grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    .user-card { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 22px; padding: 18px; display:grid; gap:12px; }
    .user-head { display:flex; align-items:center; gap:12px; min-width:0; }
    .avatar { width:56px; height:56px; border-radius:18px; display:grid; place-items:center; background: linear-gradient(135deg, rgba(61,166,90,.22), rgba(240,188,46,.16)); flex-shrink:0; font-size:1.5rem; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .meta { min-width:0; }
    .name { font-weight:800; font-family: var(--font-head); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .role { color: var(--text-secondary); font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bio { color: var(--text-muted); line-height:1.55; font-size:.94rem; }
    .stats { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text-secondary); font-size:.78rem; }
    .empty { color: var(--text-muted); padding: 16px 0; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 18px; align-items:center; justify-content:space-between; }
    input[type="search"] { flex:1; min-width:220px; padding:12px 14px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text-primary); outline: none; }
    input[type="search"]:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(61,166,90,.16); }
    .mini { color: var(--text-muted); font-size:.9rem; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } .topbar-inner { padding: 14px 16px; } .hero, .panel { padding-left: 16px; padding-right: 16px; } }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/index.html" aria-label="GabaoIndex Home">🌿 Gabao<strong>Index</strong></a>
        <div class="actions">
          <a class="btn-link" href="/index.html">Accueil</a>
          <a class="btn-link" href="/profile.html">Profil</a>
          <a class="btn-link btn-primary" href="/profile.html">Mon profil</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <p class="mini" data-fr="Réseau communautaire" data-en="Community network">Réseau communautaire</p>
        <h1 data-fr="Profils, avis et contributions de la communauté" data-en="Profiles, reviews and community contributions">Profils, avis et contributions de la communauté</h1>
        <p data-fr="Connectez-vous pour créer votre profil, suivre vos avis, et explorer les contributeurs actifs du répertoire." data-en="Log in to create your profile, track your reviews, and explore active contributors in the directory.">Connectez-vous pour créer votre profil, suivre vos avis, et explorer les contributeurs actifs du répertoire.</p>
      </section>

      <section class="panel">
        <div class="card">
          <div class="toolbar">
            <input id="searchUsers" type="search" placeholder="Rechercher un profil..." />
            <div class="mini" id="usersCount">0 profils</div>
          </div>
          <div class="grid" id="usersGrid"></div>
          <div class="empty" id="usersEmpty" style="display:none;">Aucun profil trouvé.</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { GoogleAuthProvider, onAuthStateChanged, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import { collection, getDocs, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

    const provider = new GoogleAuthProvider();
    const usersGrid = document.getElementById('usersGrid');
    const usersEmpty = document.getElementById('usersEmpty');
    const usersCount = document.getElementById('usersCount');
    const searchUsers = document.getElementById('searchUsers');
    const profileBtn = document.querySelector('a.btn-link.btn-primary[href="/profile.html"]');

    let profiles = [];
    let currentUser = null;

    function getDisplayName(profile) {
      return profile.displayName || profile.fullName || profile.email || 'Utilisateur';
    }

    function getRole(profile) {
      return profile.role || (profile.isAdmin ? 'Administrateur' : 'Contributeur');
    }

    function renderProfiles() {
      const q = searchUsers.value.trim().toLowerCase();
      const filtered = profiles.filter((profile) => {
        const text = [profile.displayName, profile.fullName, profile.email, profile.role, profile.bio].filter(Boolean).join(' ').toLowerCase();
        return !q || text.includes(q);
      });

      usersCount.textContent = `${filtered.length} profil${filtered.length !== 1 ? 's' : ''}`;
      usersEmpty.style.display = filtered.length ? 'none' : 'block';
      usersGrid.innerHTML = filtered.map((profile) => `
        <article class="user-card">
          <div class="user-head">
            <div class="avatar">${profile.photoUrl ? `<img src="${profile.photoUrl}" alt="${getDisplayName(profile)}">` : '👤'}</div>
            <div class="meta">
              <div class="name">${getDisplayName(profile)}</div>
              <div class="role">${getRole(profile)}</div>
            </div>
          </div>
          <div class="bio">${profile.bio || 'Profil sans bio pour le moment.'}</div>
          <div class="stats">
            <span class="chip">${profile.reviewCount || 0} avis</span>
            <span class="chip">${profile.ratingAverage ? `${Number(profile.ratingAverage).toFixed(1)}/5 moyenne` : 'Moyenne non notée'}</span>
            <span class="chip">${profile.city || 'Gabon'}</span>
          </div>
          <a class="btn-link btn-primary" href="/profile.html?uid=${encodeURIComponent(profile.uid || '')}">Voir le profil</a>
        </article>
      `).join('');
    }

    async function loadProfiles() {
      const snapshot = await getDocs(query(collection(db, 'user_profiles'), orderBy('updatedAt', 'desc')));
      profiles = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      renderProfiles();
    }

    searchUsers.addEventListener('input', renderProfiles);

    onAuthStateChanged(auth, async (user) => {
      currentUser = user || null;
      try {
        await loadProfiles();
      } catch (error) {
        console.warn('Could not load user profiles', error);
        profiles = [];
        renderProfiles();
      }

      if (!currentUser) {
        const loginPrompt = document.createElement('div');
        loginPrompt.style.cssText = 'margin:20px 0 0; padding:14px 16px; border:1px solid var(--border); border-radius:16px; background:rgba(255,255,255,.04); color:var(--text-secondary);';
        loginPrompt.innerHTML = '<strong style="color:var(--text-primary);">Connexion recommandée</strong><div style="margin-top:6px;">Connectez-vous sur la page profil pour synchroniser vos avis et votre identité.</div>';
        document.querySelector('.card').prepend(loginPrompt);
      }
    });

    profileBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        await signInWithPopup(auth, provider);
        window.location.href = '/profile.html';
      } catch (error) {
        console.error('Login failed', error);
        window.location.href = '/profile.html';
      }
    });
  </script>
</body>
</html>
