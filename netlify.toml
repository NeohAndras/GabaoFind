[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/data.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
```javascript
const fs = require('fs');
const path = require('path');

exports.handler = async (event, context) => {
  // Enable CORS
  const headers = {
    'Access-Control-Allow-Origin': '*',
    'Access-Control-Allow-Headers': 'Content-Type',
    'Access-Control-Allow-Methods': 'GET, POST, OPTIONS'
  };

  if (event.httpMethod === 'OPTIONS') {
    return { statusCode: 200, headers, body: '' };
  }

  try {
    if (event.httpMethod === 'GET') {
      // Load data
      const dataPath = path.join(__dirname, '../../../data.json');
      const data = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
      return {
        statusCode: 200,
        headers,
        body: JSON.stringify(data)
      };
    } else if (event.httpMethod === 'POST') {
      // Save data (Note: This won't work in production without persistent storage)
      const dataPath = path.join(__dirname, '../../../data.json');
      fs.writeFileSync(dataPath, JSON.stringify(JSON.parse(event.body), null, 2));
      return {
        statusCode: 200,
        headers,
        body: JSON.stringify({ success: true, message: 'Data saved successfully' })
      };
    }
  } catch (error) {
    return {
      statusCode: 500,
      headers,
      body: JSON.stringify({ error: error.message })
    };
  }
};
```

Create `netlify/functions/geocode.js`:
```javascript
exports.handler = async (event, context) => {
  const headers = {
    'Access-Control-Allow-Origin': '*',
    'Access-Control-Allow-Headers': 'Content-Type',
    'Access-Control-Allow-Methods': 'GET, POST, OPTIONS'
  };

  if (event.httpMethod === 'OPTIONS') {
    return { statusCode: 200, headers, body: '' };
  }

  if (event.httpMethod === 'GET') {
    const { address } = event.queryStringParameters;
    if (!address) {
      return { statusCode: 400, headers, body: JSON.stringify({ error: 'Address required' }) };
    }

    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ', Gabon')}&countrycodes=GA&limit=1`;
      const response = await fetch(url, {
        headers: { 'User-Agent': 'GabaoIndex/1.0' }
      });
      const data = await response.json();

      if (data.length > 0) {
        return {
          statusCode: 200,
          headers,
          body: JSON.stringify({
            lat: parseFloat(data[0].lat),
            lng: parseFloat(data[0].lon)
          })
        };
      } else {
        return {
          statusCode: 404,
          headers,
          body: JSON.stringify({ error: 'Address not found' })
        };
      }
    } catch (error) {
      return {
        statusCode: 500,
        headers,
        body: JSON.stringify({ error: error.message })
      };
    }
  }

  return { statusCode: 405, headers, body: JSON.stringify({ error: 'Method not allowed' }) };
};
```

### 3. Update Admin HTML for Netlify Functions

Update the API calls in `admin.html` to use Netlify functions:

```javascript
// Replace fetch('/api/data') with fetch('/.netlify/functions/data')
// Replace fetch('/api/geocode') with fetch('/.netlify/functions/geocode')
```

### 4. Create netlify.toml Configuration

Create `netlify.toml` in the root directory:
```toml
[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/data.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
```

### 5. Create _redirects File

Create `public/_redirects` (or just `_redirects` in root):
```
/api/data /.netlify/functions/data 200
/api/geocode /.netlify/functions/geocode 200
/* /index.html 200
```

## Deployment Steps

### Step 1: Prepare Your Repository
1. Commit all your changes to git
2. Push to your Git repository (GitHub, GitLab, or Bitbucket)

### Step 2: Connect to Netlify
1. Go to [netlify.com](https://netlify.com) and sign in
2. Click "Add new site" → "Import an existing project"
3. Connect your Git repository
4. Configure build settings:
   - **Branch to deploy**: `main` (or your default branch)
   - **Build command**: Leave empty (static site)
   - **Publish directory**: `.` (root directory)

### Step 3: Environment Variables (Optional)
If you need environment variables, add them in Netlify dashboard:
- Go to Site settings → Environment variables
- Add any required variables (currently none needed)

### Step 4: Deploy
1. Click "Deploy site"
2. Wait for deployment to complete
3. Your site will be available at `https://your-site-name.netlify.app`

## Data Persistence Issue

⚠️ **Important**: The current setup has a data persistence issue. In production, the `data.json` file cannot be written to by serverless functions. You have several options:

### Option 1: Use Netlify Blobs (Recommended)
1. Install Netlify CLI: `npm install -g netlify-cli`
2. Create a blob store: `netlify blobs:create gabonfind-data`
3. Update the functions to use blobs instead of file system

### Option 2: Use External Database
- Use Supabase, Firebase, or MongoDB Atlas
- Update functions to use database instead of JSON file

### Option 3: Manual Data Updates
- Keep data.json in repository
- Update data through Git commits only
- Remove save functionality from admin panel

## Custom Domain (Optional)

### Using Netlify Domain
1. Go to Site settings → Domain management
2. Netlify will provide a `netlify.app` subdomain

### Using Custom Domain
1. Go to Site settings → Domain management
2. Click "Add custom domain"
3. Follow DNS configuration instructions

## Testing Your Deployment

### Local Testing with Netlify CLI
```bash
# Install Netlify CLI
npm install -g netlify-cli

# Login to Netlify
netlify login

# Test functions locally
netlify dev
```

### Test URLs
- **Main site**: `https://your-site-name.netlify.app`
- **Admin panel**: `https://your-site-name.netlify.app/admin.html`
- **API endpoints**:
  - `https://your-site-name.netlify.app/.netlify/functions/data`
  - `https://your-site-name.netlify.app/.netlify/functions/geocode`

## Troubleshooting

### Common Issues

1. **Functions not working**
   - Check function logs in Netlify dashboard
   - Ensure functions are in `netlify/functions/` directory
   - Verify function names match API calls

2. **Data not saving**
   - This is expected in serverless environment
   - Implement one of the data persistence solutions above

3. **CORS errors**
   - Check that CORS headers are set in functions
   - Verify API calls use correct Netlify function URLs

4. **Build failures**
   - Check build logs in Netlify dashboard
   - Ensure all dependencies are in package.json
   - Verify Node.js version compatibility

### Performance Optimization

1. **Enable gzip compression** (automatically enabled)
2. **Optimize images** in the `img/` folder
3. **Use CDN** for external resources (already using CDN for fonts and Leaflet)
4. **Minify HTML/CSS/JS** for production

## Maintenance

### Updating Content
- For data updates: Edit `data.json` and commit to repository
- For code changes: Push changes to your Git repository
- Netlify will automatically redeploy on new commits

### Monitoring
- Check site analytics in Netlify dashboard
- Monitor function performance and errors
- Set up uptime monitoring if needed

## Security Considerations

1. **Admin Panel Protection**
   - Consider adding authentication (Netlify Identity or custom solution)
   - Use HTTPS (automatically enabled)
   - Implement rate limiting for API endpoints

2. **Data Security**
   - Never store sensitive data in client-side code
   - Use environment variables for API keys
   - Implement proper input validation

## Support

- **Netlify Documentation**: [docs.netlify.com](https://docs.netlify.com)
- **Netlify Community**: [community.netlify.com](https://community.netlify.com)
- **GitHub Issues**: Report issues in your repository

---

**Note**: This deployment guide converts your Express.js backend to Netlify Functions. For full CRUD functionality in production, you'll need to implement persistent data storage as mentioned in the data persistence section.</content>
